variables:
  APP_DB_NAME:
    source: APP_DB_NAME
    type: str
  APP_DB_HOST:
    source: APP_DB_HOST
    type: str
  APP_DB_PORT:
    source: APP_DB_PORT
    type: int
  APP_DB_USER:
    source: APP_DB_USER
    type: str

environments:
  default:
    origin: gcp
    gcp_project_id: <your-gcp-project-id>

validation:
  strict: true
  required:
    - APP_DB_NAME
    - APP_DB_HOST
    - APP_DB_PORT
    - APP_DB_USER
